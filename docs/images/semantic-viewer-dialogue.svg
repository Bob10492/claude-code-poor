<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">How to read semantic viewer dialogue</title>
  <desc id="desc">Schematic showing a focused child-query node and the order for reading the dialogue drawer from carried assistant context through user prompt and assistant output.</desc>
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .card { fill: #ffffff; stroke: #d8e2ef; stroke-width: 1.5; }
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #17324d; }
      .subtitle { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #35516d; }
      .body { font: 14px 'Segoe UI', Arial, sans-serif; fill: #3c4f63; }
      .small { font: 12px 'Segoe UI', Arial, sans-serif; fill: #5f7388; }
      .node-main { fill: #e8f1ff; stroke: #5b8dd8; stroke-width: 2; }
      .node-branch { fill: #fff2dd; stroke: #e39b37; stroke-width: 2.5; }
      .line { stroke: #8fa8c3; stroke-width: 2.5; fill: none; }
      .fork { stroke: #2f6f94; stroke-width: 3; stroke-dasharray: 8 6; fill: none; }
      .tab { fill: #fff4e6; stroke: #f0c27a; stroke-width: 1.5; }
      .assistant { fill: #fff4eb; stroke: #efc99a; stroke-width: 1; }
      .tool { fill: #edf9ef; stroke: #aad4b0; stroke-width: 1; }
      .user { fill: #ebf4ff; stroke: #9fc0eb; stroke-width: 1; }
      .step { fill: #17324d; }
      .stepText { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #17324d; stroke-width: 2.5; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#17324d"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760"/>
  <text class="title" x="44" y="54">How to read a node Dialogue</text>
  <text class="body" x="44" y="84">Use the graph to locate the branch, then read the drawer from carried context down to the child query output.</text>

  <rect class="card" x="36" y="116" rx="20" ry="20" width="1208" height="608"/>

  <rect class="card" x="60" y="144" rx="16" ry="16" width="360" height="552"/>
  <text class="subtitle" x="86" y="180">Branch location in the graph</text>
  <path class="line" d="M 238 232 L 238 430" marker-end="url(#arrow)"/>
  <rect class="node-main" x="158" y="212" rx="14" ry="14" width="160" height="54"/>
  <text class="body" x="181" y="237">main / turn-14</text>
  <rect class="node-main" x="138" y="320" rx="14" ry="14" width="200" height="64"/>
  <text class="body" x="165" y="346">main / turn-15</text>
  <text class="small" x="165" y="365">fork:2</text>
  <path class="fork" d="M 138 352 C 112 352, 94 352, 78 352" marker-end="url(#arrow)"/>
  <rect class="node-branch" x="86" y="412" rx="14" ry="14" width="176" height="72"/>
  <text class="body" x="107" y="440">prompt_suggestion</text>
  <text class="small" x="107" y="460">3032e0f1... / turn-1</text>
  <text class="small" x="86" y="544">This node is not a human chat turn.</text>
  <text class="small" x="86" y="562">It is a child query doing one job.</text>

  <rect class="card" x="452" y="144" rx="16" ry="16" width="748" height="552"/>
  <text class="subtitle" x="478" y="180">Dialogue drawer</text>
  <rect class="tab" x="478" y="200" rx="10" ry="10" width="78" height="30"/>
  <text class="small" x="496" y="219">Dialogue</text>

  <rect class="assistant" x="478" y="252" rx="12" ry="12" width="680" height="82"/>
  <text class="subtitle" x="498" y="276">Assistant (carried into this turn)</text>
  <text class="small" x="498" y="300">Pull --rebase succeeded. Now we can push.</text>
  <text class="small" x="498" y="318">This is old parent-thread context, not a fresh reply.</text>

  <rect class="tool" x="478" y="352" rx="12" ry="12" width="680" height="78"/>
  <text class="subtitle" x="498" y="376">Tool result</text>
  <text class="small" x="498" y="400">main -&gt; main</text>
  <text class="small" x="498" y="418">Observed result from the carried tool call.</text>

  <rect class="user" x="478" y="448" rx="12" ry="12" width="680" height="78"/>
  <text class="subtitle" x="498" y="472">User</text>
  <text class="small" x="498" y="496">[SUGGESTION MODE]</text>
  <text class="small" x="498" y="514">This is the task prompt sent into the child query.</text>

  <rect class="assistant" x="478" y="544" rx="12" ry="12" width="680" height="88"/>
  <text class="subtitle" x="498" y="568">Assistant</text>
  <text class="small" x="498" y="592">Suggested next user input returned by prompt_suggestion.</text>
  <text class="small" x="498" y="610">This is the child query's actual new output.</text>

  <circle class="step" cx="452" cy="292" r="16"/><text class="stepText" x="447" y="297">1</text>
  <circle class="step" cx="452" cy="390" r="16"/><text class="stepText" x="447" y="395">2</text>
  <circle class="step" cx="452" cy="486" r="16"/><text class="stepText" x="447" y="491">3</text>
  <circle class="step" cx="452" cy="588" r="16"/><text class="stepText" x="447" y="593">4</text>

  <path class="arrow" d="M 290 448 C 356 448, 402 420, 442 330" marker-end="url(#arrow)"/>
  <text class="small" x="248" y="484">Click the child-query node,</text>
  <text class="small" x="248" y="502">then read the drawer top to bottom.</text>

  <text class="small" x="478" y="662">Color legend: orange = assistant, green = tool result, blue = user.</text>
</svg>
